<svg viewBox="0 0 1000 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d96bc"/>
    </marker>
    <marker id="skip" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#cf7a3c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="440" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Segmentation Network — UNet with SimCLR Encoder</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">ResNet18 encoder initialized from SimCLR · skip connections · BCEWithLogitsLoss (pos_weight = 10)</text>

  <!-- input -->
  <rect x="36" y="200" width="92" height="92" rx="8" fill="#efe3d2" stroke="#c7b291"/>
  <text x="82" y="312" text-anchor="middle" font-size="11" fill="#6b7b8c">512×512 tile</text>

  <!-- encoder blocks (down) -->
  <g>
    <rect x="170" y="150" width="78" height="64" rx="8" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="209" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#1e497d">x1</text>
    <rect x="170" y="226" width="78" height="56" rx="8" fill="#e3edfc" stroke="#9db8e8"/>
    <text x="209" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#1e497d">x2</text>
    <rect x="170" y="294" width="78" height="48" rx="8" fill="#d8e5fa" stroke="#9db8e8"/>
    <text x="209" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#1e497d">x3</text>
  </g>
  <text x="209" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#5774a0">encoder ↓</text>

  <!-- bottleneck -->
  <rect x="300" y="250" width="120" height="80" rx="10" fill="#dceafb" stroke="#7d96bc"/>
  <text x="360" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#1e497d">x4 bottleneck</text>
  <text x="360" y="303" text-anchor="middle" font-size="11" fill="#5774a0">SimCLR features</text>

  <!-- decoder blocks (up) -->
  <g>
    <rect x="472" y="294" width="78" height="48" rx="8" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="511" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#11694a">up3</text>
    <rect x="472" y="226" width="78" height="56" rx="8" fill="#dff3ea" stroke="#7bccab"/>
    <text x="511" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#11694a">up2</text>
    <rect x="472" y="150" width="78" height="64" rx="8" fill="#d6efe2" stroke="#7bccab"/>
    <text x="511" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#11694a">up1</text>
  </g>
  <text x="511" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#3c8a6c">decoder ↑</text>

  <!-- up5 to full res -->
  <rect x="600" y="170" width="92" height="92" rx="8" fill="#cdeede" stroke="#7bccab"/>
  <text x="646" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#11694a">UP5</text>
  <text x="646" y="230" text-anchor="middle" font-size="10" fill="#3c8a6c">→ 512×512</text>

  <!-- sigmoid + output mask -->
  <rect x="730" y="186" width="96" height="60" rx="10" fill="#fff" stroke="#cfd8e3"/>
  <text x="778" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">sigmoid</text>
  <text x="778" y="230" text-anchor="middle" font-size="11" fill="#6b7b8c">thr 0.5</text>

  <rect x="868" y="170" width="92" height="92" rx="8" fill="#1f2d3d" stroke="#16324f"/>
  <path d="M886,232 q14,-40 26,-4 q8,-26 22,2" fill="none" stroke="#7be0b0" stroke-width="3"/>
  <circle cx="914" cy="206" r="9" fill="#7be0b0"/>
  <text x="914" y="280" text-anchor="middle" font-size="11" fill="#6b7b8c">binary mask</text>

  <!-- main flow arrows -->
  <g stroke="#7d96bc" stroke-width="2" fill="none">
    <line x1="128" y1="246" x2="166" y2="246" marker-end="url(#arrow)"/>
    <line x1="248" y1="290" x2="296" y2="290" marker-end="url(#arrow)"/>
    <line x1="420" y1="290" x2="468" y2="290" marker-end="url(#arrow)"/>
    <line x1="550" y1="182" x2="596" y2="200" marker-end="url(#arrow)"/>
    <line x1="692" y1="216" x2="726" y2="216" marker-end="url(#arrow)"/>
    <line x1="826" y1="216" x2="864" y2="216" marker-end="url(#arrow)"/>
  </g>

  <!-- skip connections -->
  <g stroke="#cf7a3c" stroke-width="1.8" stroke-dasharray="5 4" fill="none">
    <path d="M248,182 L420,182 L468,182" marker-end="url(#skip)"/>
    <path d="M248,254 L460,254" marker-end="url(#skip)"/>
    <path d="M248,318 L468,318" marker-end="url(#skip)"/>
  </g>
  <text x="300" y="172" font-size="10" fill="#cf7a3c">skip connections</text>

  <!-- metrics -->
  <rect x="36" y="368" width="924" height="48" rx="10" fill="#f3f6f9" stroke="#e3e8ee"/>
  <text x="56" y="397" font-size="12" fill="#16324f"><tspan font-weight="700">Best val loss 0.0352</tspan>  ·  train loss 0.0309  ·  best epoch 3  ·  Adam lr 3e-4  ·  ReduceLROnPlateau  ·  logged to MLflow registry</text>
</svg>
