<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9a86b8"/>
    </marker>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efe3d2"/><stop offset="1" stop-color="#d8c4a6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1000" height="420" rx="16" fill="#fbfafe" stroke="#e8e2f0"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#4a1d6e">Self-Supervised Pre-training — SimCLR</text>
  <text x="32" y="68" font-size="13" fill="#7a6b8c">Learn astrocyte/tissue representations from unlabeled GFAP tiles · NT-Xent loss, τ = 0.1</text>

  <!-- source tile -->
  <rect x="40" y="170" width="86" height="86" rx="8" fill="url(#tile)" stroke="#c7b291"/>
  <text x="83" y="278" text-anchor="middle" font-size="12" fill="#7a6b8c">tile</text>

  <!-- two augmented views -->
  <rect x="210" y="110" width="78" height="78" rx="8" fill="url(#tile)" stroke="#c7b291"/>
  <text x="249" y="102" text-anchor="middle" font-size="11" fill="#7a6b8c">view x̃ᵢ</text>
  <rect x="210" y="240" width="78" height="78" rx="8" fill="url(#tile)" stroke="#c7b291"/>
  <text x="249" y="335" text-anchor="middle" font-size="11" fill="#7a6b8c">view x̃ⱼ</text>

  <!-- encoder -->
  <rect x="360" y="104" width="150" height="90" rx="12" fill="#f0e8fa" stroke="#c59bdf"/>
  <text x="435" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">ResNet18 f(·)</text>
  <text x="435" y="162" text-anchor="middle" font-size="11" fill="#7e57a8">shared encoder</text>
  <text x="435" y="178" text-anchor="middle" font-size="11" fill="#7e57a8">h ∈ ℝ⁵¹²</text>

  <rect x="360" y="234" width="150" height="90" rx="12" fill="#f0e8fa" stroke="#c59bdf"/>
  <text x="435" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">ResNet18 f(·)</text>
  <text x="435" y="292" text-anchor="middle" font-size="11" fill="#7e57a8">shared weights</text>
  <text x="435" y="308" text-anchor="middle" font-size="11" fill="#7e57a8">h ∈ ℝ⁵¹²</text>

  <!-- projection head -->
  <rect x="560" y="116" width="130" height="66" rx="12" fill="#fff" stroke="#cbb6e0"/>
  <text x="625" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#5a3a82">MLP g(·)</text>
  <text x="625" y="164" text-anchor="middle" font-size="11" fill="#8a76a8">512 → 128</text>

  <rect x="560" y="246" width="130" height="66" rx="12" fill="#fff" stroke="#cbb6e0"/>
  <text x="625" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#5a3a82">MLP g(·)</text>
  <text x="625" y="294" text-anchor="middle" font-size="11" fill="#8a76a8">512 → 128</text>

  <!-- embeddings + loss -->
  <circle cx="760" cy="149" r="10" fill="#6a1b9a"/>
  <text x="788" y="153" font-size="12" fill="#5a3a82">zᵢ</text>
  <circle cx="760" cy="279" r="10" fill="#6a1b9a"/>
  <text x="788" y="283" font-size="12" fill="#5a3a82">zⱼ</text>

  <rect x="828" y="170" width="140" height="88" rx="12" fill="#f0e8fa" stroke="#c59bdf"/>
  <text x="898" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">NT-Xent</text>
  <text x="898" y="220" text-anchor="middle" font-size="11" fill="#7e57a8">pull positives ↓</text>
  <text x="898" y="236" text-anchor="middle" font-size="11" fill="#7e57a8">push negatives ↑</text>

  <!-- arrows -->
  <g stroke="#9a86b8" stroke-width="2" fill="none">
    <path d="M126,200 L168,150 L206,150" marker-end="url(#arrow)"/>
    <path d="M126,226 L168,278 L206,278" marker-end="url(#arrow)"/>
    <line x1="288" y1="149" x2="356" y2="149" marker-end="url(#arrow)"/>
    <line x1="288" y1="279" x2="356" y2="279" marker-end="url(#arrow)"/>
    <line x1="510" y1="149" x2="556" y2="149" marker-end="url(#arrow)"/>
    <line x1="510" y1="279" x2="556" y2="279" marker-end="url(#arrow)"/>
    <line x1="690" y1="149" x2="746" y2="149" marker-end="url(#arrow)"/>
    <line x1="690" y1="279" x2="746" y2="279" marker-end="url(#arrow)"/>
    <path d="M772,149 L898,149 L898,166" marker-end="url(#arrow)"/>
    <path d="M772,279 L898,279 L898,262" marker-end="url(#arrow)"/>
  </g>

  <!-- aug caption -->
  <text x="150" y="372" font-size="12" fill="#7a6b8c">Augmentations: random resized crop (224), flip, color jitter, grayscale, Gaussian blur</text>
  <text x="150" y="392" font-size="12" fill="#7a6b8c">Optimizer LARS · batch 128 · lr 1e-3 · 200 epochs → encoder reused to initialize UNet</text>
</svg>
