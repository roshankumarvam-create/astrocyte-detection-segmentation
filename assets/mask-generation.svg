<svg viewBox="0 0 1040 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="320" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Segmentation Masks Directly from Detection Annotations</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">No weak-label pipeline — each COCO bounding box is converted into a binary astrocyte mask</text>

  <!-- 1. detection tile with bboxes -->
  <g>
    <rect x="40" y="110" width="120" height="120" rx="8" fill="#efe3d2" stroke="#c7b291"/>
    <rect x="58" y="132" width="34" height="30" fill="none" stroke="#c0392b" stroke-width="2"/>
    <rect x="104" y="170" width="40" height="34" fill="none" stroke="#c0392b" stroke-width="2"/>
    <rect x="64" y="186" width="28" height="26" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">detections</text>
    <text x="100" y="270" text-anchor="middle" font-size="11" fill="#6b7b8c">COCO bboxes</text>
  </g>

  <!-- 2. crop -->
  <g>
    <rect x="232" y="130" width="80" height="80" rx="8" fill="#efe3d2" stroke="#c7b291"/>
    <path d="M258,196 q12,-44 22,-6 q8,-22 18,2" fill="none" stroke="#9c6b3a" stroke-width="2.5"/>
    <circle cx="280" cy="168" r="8" fill="#9c6b3a"/>
    <text x="272" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">crop</text>
  </g>

  <!-- 3. gamma -->
  <g>
    <rect x="384" y="130" width="80" height="80" rx="8" fill="#3a2f24" stroke="#2a221a"/>
    <path d="M410,196 q12,-44 22,-6 q8,-22 18,2" fill="none" stroke="#e9c89a" stroke-width="2.5"/>
    <circle cx="432" cy="168" r="8" fill="#e9c89a"/>
    <text x="424" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">gamma γ=3</text>
    <text x="424" y="252" text-anchor="middle" font-size="11" fill="#6b7b8c">grayscale</text>
  </g>

  <!-- 4. otsu -->
  <g>
    <rect x="536" y="130" width="80" height="80" rx="8" fill="#ffffff" stroke="#cfd8e3"/>
    <path d="M562,196 q12,-44 22,-6 q8,-22 18,2" fill="none" stroke="#16324f" stroke-width="2.5"/>
    <circle cx="584" cy="168" r="8" fill="#16324f"/>
    <text x="576" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">Otsu thresh</text>
    <text x="576" y="252" text-anchor="middle" font-size="11" fill="#6b7b8c">+ remove small</text>
  </g>

  <!-- 5. paste into full mask -->
  <g>
    <rect x="688" y="110" width="120" height="120" rx="8" fill="#1f2d3d" stroke="#16324f"/>
    <path d="M706,148 q10,-26 18,-4 q6,-16 14,1" fill="none" stroke="#7be0b0" stroke-width="2"/>
    <circle cx="724" cy="135" r="6" fill="#7be0b0"/>
    <path d="M750,198 q10,-26 18,-4 q6,-16 14,1" fill="none" stroke="#7be0b0" stroke-width="2"/>
    <circle cx="768" cy="185" r="6" fill="#7be0b0"/>
    <text x="748" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#16324f">full-image mask</text>
    <text x="748" y="270" text-anchor="middle" font-size="11" fill="#6b7b8c">0=bg · 1=astrocyte</text>
  </g>

  <!-- 6. unet -->
  <g>
    <rect x="868" y="130" width="140" height="80" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="938" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#1e497d">UNet training</text>
    <text x="938" y="186" text-anchor="middle" font-size="11" fill="#5774a0">image ↔ mask pairs</text>
  </g>

  <!-- arrows -->
  <g stroke="#90a4ae" stroke-width="2" fill="none">
    <line x1="160" y1="170" x2="226" y2="170" marker-end="url(#arrow)"/>
    <line x1="312" y1="170" x2="378" y2="170" marker-end="url(#arrow)"/>
    <line x1="464" y1="170" x2="530" y2="170" marker-end="url(#arrow)"/>
    <line x1="616" y1="170" x2="682" y2="170" marker-end="url(#arrow)"/>
    <line x1="808" y1="170" x2="862" y2="170" marker-end="url(#arrow)"/>
  </g>
</svg>
