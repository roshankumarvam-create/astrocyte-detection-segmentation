<svg viewBox="0 0 1040 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f6f9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1040" height="360" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Astrocyte Detection &amp; Segmentation — Pipeline</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">Gigapixel whole-slide image → per-cell morphometrics</text>

  <!-- nodes -->
  <g>
    <!-- node template: rect + label + sub -->
    <g>
      <rect x="32" y="110" width="150" height="80" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
      <text x="107" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">WSI input</text>
      <text x="107" y="166" text-anchor="middle" font-size="11" fill="#6b7b8c">100k × 100k px</text>
    </g>
    <g>
      <rect x="212" y="110" width="150" height="80" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
      <text x="287" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Tiling</text>
      <text x="287" y="166" text-anchor="middle" font-size="11" fill="#6b7b8c">overlapping patches</text>
    </g>
    <g>
      <rect x="392" y="110" width="150" height="80" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
      <text x="467" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">YOLO detect</text>
      <text x="467" y="166" text-anchor="middle" font-size="11" fill="#5774a0">high-recall localize</text>
    </g>
    <g>
      <rect x="572" y="110" width="160" height="80" rx="12" fill="#f5eefb" stroke="#c59bdf"/>
      <text x="652" y="139" text-anchor="middle" font-size="14" font-weight="700" fill="#6a1b9a">DAB</text>
      <text x="652" y="158" text-anchor="middle" font-size="11" fill="#7e57a8">color deconvolution</text>
      <text x="652" y="174" text-anchor="middle" font-size="11" fill="#7e57a8">isolate GFAP signal</text>
    </g>
    <g>
      <rect x="762" y="110" width="160" height="80" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
      <text x="842" y="139" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">Instance</text>
      <text x="842" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">segmentation</text>
      <text x="842" y="176" text-anchor="middle" font-size="11" fill="#5774a0">soma + processes</text>
    </g>

    <!-- second row -->
    <g>
      <rect x="572" y="240" width="160" height="80" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
      <text x="652" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Morphometrics</text>
      <text x="652" y="290" text-anchor="middle" font-size="11" fill="#6b7b8c">area · branches ·</text>
      <text x="652" y="305" text-anchor="middle" font-size="11" fill="#6b7b8c">process length</text>
    </g>
    <g>
      <rect x="762" y="240" width="160" height="80" rx="12" fill="#e7f7f0" stroke="#7bccab"/>
      <text x="842" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">FastAPI +</text>
      <text x="842" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">OpenSeadragon</text>
      <text x="842" y="307" text-anchor="middle" font-size="11" fill="#3c8a6c">deep-zoom review</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#90a4ae" stroke-width="2" fill="none">
    <line x1="182" y1="150" x2="206" y2="150" marker-end="url(#arrow)"/>
    <line x1="362" y1="150" x2="386" y2="150" marker-end="url(#arrow)"/>
    <line x1="542" y1="150" x2="566" y2="150" marker-end="url(#arrow)"/>
    <line x1="732" y1="150" x2="756" y2="150" marker-end="url(#arrow)"/>
    <path d="M842,190 L842,212 L652,212 L652,236" marker-end="url(#arrow)"/>
    <line x1="732" y1="280" x2="756" y2="280" marker-end="url(#arrow)"/>
  </g>
</svg>
