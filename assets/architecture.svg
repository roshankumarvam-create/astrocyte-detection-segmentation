<svg viewBox="0 0 1080 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f6f9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1080" height="470" rx="16" fill="#fbfcfe" stroke="#e3e8ee"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#16324f">Astrocyte Detection &amp; Segmentation — End-to-End Pipeline</text>
  <text x="32" y="68" font-size="13" fill="#5b6b7b">Gigapixel GFAP whole-slide image → detections → masks → self-supervised segmentation → clinical density</text>

  <!-- Row 1: detection + mask generation -->
  <text x="32" y="104" font-size="12" font-weight="700" fill="#94a3b4" letter-spacing="1">STAGE A — DETECTION &amp; GROUND TRUTH</text>
  <g>
    <rect x="32" y="118" width="150" height="78" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="107" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">WSI input</text>
    <text x="107" y="171" text-anchor="middle" font-size="11" fill="#6b7b8c">200k × 300k px</text>
  </g>
  <g>
    <rect x="212" y="118" width="150" height="78" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="287" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Tiling</text>
    <text x="287" y="171" text-anchor="middle" font-size="11" fill="#6b7b8c">512 × 512 patches</text>
  </g>
  <g>
    <rect x="392" y="118" width="160" height="78" rx="12" fill="#fdeeea" stroke="#eaa78f"/>
    <text x="472" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">YOLOv5 detect</text>
    <text x="472" y="165" text-anchor="middle" font-size="11" fill="#b5685a">GFAP+ astrocytes</text>
    <text x="472" y="181" text-anchor="middle" font-size="11" fill="#b5685a">IoU 0.45 · high recall</text>
  </g>
  <g>
    <rect x="582" y="118" width="170" height="78" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="667" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Mask generation</text>
    <text x="667" y="165" text-anchor="middle" font-size="11" fill="#6b7b8c">bbox → gamma → Otsu</text>
    <text x="667" y="181" text-anchor="middle" font-size="11" fill="#6b7b8c">binary full-image mask</text>
  </g>

  <!-- Row 2: SSL + segmentation -->
  <text x="32" y="244" font-size="12" font-weight="700" fill="#94a3b4" letter-spacing="1">STAGE B — SELF-SUPERVISED SEGMENTATION</text>
  <g>
    <rect x="32" y="258" width="180" height="82" rx="12" fill="#f5eefb" stroke="#c59bdf"/>
    <text x="122" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#6a1b9a">SimCLR pre-train</text>
    <text x="122" y="307" text-anchor="middle" font-size="11" fill="#7e57a8">ResNet18 · NT-Xent</text>
    <text x="122" y="323" text-anchor="middle" font-size="11" fill="#7e57a8">unlabeled tiles</text>
  </g>
  <g>
    <rect x="242" y="258" width="180" height="82" rx="12" fill="#eef4ff" stroke="#9db8e8"/>
    <text x="332" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#1e497d">UNet + SimCLR</text>
    <text x="332" y="307" text-anchor="middle" font-size="11" fill="#5774a0">ResNet18 encoder init</text>
    <text x="332" y="323" text-anchor="middle" font-size="11" fill="#5774a0">skip connections</text>
  </g>
  <g>
    <rect x="452" y="258" width="170" height="82" rx="12" fill="url(#g1)" stroke="#cfd8e3"/>
    <text x="537" y="288" text-anchor="middle" font-size="14" font-weight="600" fill="#16324f">Binary mask</text>
    <text x="537" y="307" text-anchor="middle" font-size="11" fill="#6b7b8c">soma + processes</text>
    <text x="537" y="323" text-anchor="middle" font-size="11" fill="#6b7b8c">val loss 0.0352</text>
  </g>

  <!-- Row 3: deployment / clinical -->
  <text x="700" y="244" font-size="12" font-weight="700" fill="#94a3b4" letter-spacing="1">STAGE C — DEPLOY</text>
  <g>
    <rect x="700" y="258" width="160" height="82" rx="12" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="780" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">MLflow + FastAPI</text>
    <text x="780" y="307" text-anchor="middle" font-size="11" fill="#3c8a6c">pyfunc packaging</text>
    <text x="780" y="323" text-anchor="middle" font-size="11" fill="#3c8a6c">/get_mask endpoint</text>
  </g>
  <g>
    <rect x="884" y="258" width="164" height="82" rx="12" fill="#e7f7f0" stroke="#7bccab"/>
    <text x="966" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#11694a">Density / heatmap</text>
    <text x="966" y="307" text-anchor="middle" font-size="11" fill="#3c8a6c">NEGATIVE · SPARSE</text>
    <text x="966" y="323" text-anchor="middle" font-size="11" fill="#3c8a6c">· DENSE</text>
  </g>

  <!-- footer note -->
  <text x="32" y="398" font-size="12" fill="#5b6b7b">Detection annotations are reused directly as segmentation ground truth — no weak-label pipeline.</text>
  <text x="32" y="420" font-size="12" fill="#5b6b7b">Encoder learns tissue structure from unlabeled tiles, so the segmenter trains from few annotated masks.</text>

  <!-- arrows row 1 -->
  <g stroke="#90a4ae" stroke-width="2" fill="none">
    <line x1="182" y1="157" x2="206" y2="157" marker-end="url(#arrow)"/>
    <line x1="362" y1="157" x2="386" y2="157" marker-end="url(#arrow)"/>
    <line x1="552" y1="157" x2="576" y2="157" marker-end="url(#arrow)"/>
    <!-- mask gen down to UNet area -->
    <path d="M667,196 L667,224 L332,224 L332,254" marker-end="url(#arrow)"/>
    <!-- row 2 arrows -->
    <line x1="212" y1="299" x2="236" y2="299" marker-end="url(#arrow)"/>
    <line x1="422" y1="299" x2="446" y2="299" marker-end="url(#arrow)"/>
    <line x1="622" y1="299" x2="694" y2="299" marker-end="url(#arrow)"/>
    <line x1="860" y1="299" x2="878" y2="299" marker-end="url(#arrow)"/>
  </g>
</svg>
